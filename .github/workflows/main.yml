name: Build GTA V ASI Mod

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSVC Compiler
      uses: ilammy/msvc-dev-cmd@v1

    - name: Download Authentic SDK (Crosire)
      shell: cmd
      run: |
        git clone https://github.com/crosire/scripthookv.git sdk_repo
        for /r sdk_repo %%f in (*.h) do copy "%%f" .
        for /r sdk_repo %%f in (ScriptHookV.lib) do copy "%%f" .

    - name: Compile ASI File
      shell: cmd
      run: |
        cl.exe /nologo /std:c++17 /LD /EHsc main.cpp ScriptHookV.lib /I. /Fe:WeaponsOnBack.asi /link /MACHINE:X64

    - name: Upload Finished Mod
      uses: actions/upload-artifact@v4
      with:
        name: GTA5-WeaponsOnBack-Mod
        path: WeaponsOnBack.asi
