name: Build GTA V ASI Mod

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSVC Compiler
      uses: ilammy/msvc-dev-cmd@v1

    - name: Download ScriptHookV SDK (Direct)
      shell: cmd
      run: |
        curl -L -o main.h https://raw.githubusercontent.com/Give-Two/ScriptHookV/master/SDK/inc/main.h
        curl -L -o natives.h https://raw.githubusercontent.com/Give-Two/ScriptHookV/master/SDK/inc/natives.h
        curl -L -o enums.h https://raw.githubusercontent.com/Give-Two/ScriptHookV/master/SDK/inc/enums.h
        curl -L -o types.h https://raw.githubusercontent.com/Give-Two/ScriptHookV/master/SDK/inc/types.h
        curl -L -o ScriptHookV.lib https://raw.githubusercontent.com/Give-Two/ScriptHookV/master/SDK/lib/ScriptHookV.lib

    - name: Compile ASI File
      shell: cmd
      run: |
        cl.exe /nologo /LD /EHsc main.cpp ScriptHookV.lib /I. /Fe:WeaponsOnBack.asi /link /MACHINE:X64

    - name: Upload Finished Mod
      uses: actions/upload-artifact@v4
      with:
        name: GTA5-WeaponsOnBack-Mod
        path: WeaponsOnBack.asi
