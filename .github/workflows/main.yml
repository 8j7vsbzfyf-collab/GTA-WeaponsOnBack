name: Build GTA V ASI Mod

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSVC Compiler
      uses: ilammy/msvc-dev-cmd@v1

    - name: Download SDK Headers
      shell: cmd
      run: |
        git clone https://github.com/scripthookvdotnet/scripthookvdotnet.git shvdn_repo
        copy shvdn_repo\thirdparty\ScriptHookV\inc\*.h .

    - name: Forge ScriptHookV.lib Locally
      shell: cmd
      run: |
        echo EXPORTS > ScriptHookV.def
        echo createTexture >> ScriptHookV.def
        echo drawTexture >> ScriptHookV.def
        echo getGameVersion >> ScriptHookV.def
        echo getGlobalPtr >> ScriptHookV.def
        echo keyboardHandlerRegister >> ScriptHookV.def
        echo keyboardHandlerUnregister >> ScriptHookV.def
        echo nativeCall >> ScriptHookV.def
        echo nativeInit >> ScriptHookV.def
        echo nativePush64 >> ScriptHookV.def
        echo presentCallbackRegister >> ScriptHookV.def
        echo presentCallbackUnregister >> ScriptHookV.def
        echo scriptRegister >> ScriptHookV.def
        echo scriptRegisterAdditionalThread >> ScriptHookV.def
        echo scriptUnregister >> ScriptHookV.def
        echo scriptWait >> ScriptHookV.def
        echo textureHasLoaded >> ScriptHookV.def
        echo worldGetAllObjects >> ScriptHookV.def
        echo worldGetAllPeds >> ScriptHookV.def
        echo worldGetAllPickups >> ScriptHookV.def
        echo worldGetAllVehicles >> ScriptHookV.def
        lib.exe /nologo /def:ScriptHookV.def /out:ScriptHookV.lib /machine:x64

    - name: Compile ASI File
      shell: cmd
      run: |
        cl.exe /nologo /std:c++17 /LD /EHsc main.cpp ScriptHookV.lib /I. /Fe:WeaponsOnBack.asi /link /MACHINE:X64

    - name: Upload Finished Mod
      uses: actions/upload-artifact@v4
      with:
        name: GTA5-WeaponsOnBack-Mod
        path: WeaponsOnBack.asi
